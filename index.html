<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Portal Jadwal Kerja</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 40px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 0;
            right: 0;
            height: 50px;
            background: white;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .header h1 { font-size: 2.8em; margin-bottom: 10px; font-weight: 700; }
        .header p { opacity: 0.9; font-size: 1.2em; }

        .search-box {
            padding: 40px;
            background: white;
            position: relative;
            z-index: 1;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #999;
        }

        input[type="text"] {
            width: 100%;
            padding: 22px 25px 22px 60px;
            font-size: 18px;
            border: 3px solid #e0e0e0;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .content {
            padding: 0 40px 40px;
            min-height: 400px;
        }

        .welcome {
            text-align: center;
            color: #666;
            padding: 80px 20px;
        }

        .welcome-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin: 0 auto 25px;
        }

        .schedule-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .employee-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 2px solid #f5f5f5;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
            font-weight: 700;
            margin-right: 25px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .employee-info h2 {
            color: #1a1a2e;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .employee-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            font-size: 14px;
            background: #f8f9fa;
            padding: 6px 14px;
            border-radius: 20px;
        }

        .schedule-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 12px;
            overflow: hidden;
        }

        .schedule-table th {
            background: #667eea;
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 600;
        }

        .schedule-table td {
            padding: 18px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .schedule-table tr:hover { background: #fafbff; }

        .date-cell { font-weight: 600; color: #1a1a2e; }

        .shift-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .shift-pagi { background: #fff8e1; color: #f57c00; }
        .shift-siang { background: #e3f2fd; color: #1976d2; }
        .shift-sore { background: #f3e5f5; color: #7b1fa2; }
        .shift-malam { background: #e8f5e9; color: #388e3c; }
        .shift-fullday { background: #fce4ec; color: #c2185b; }
        .shift-midnight { background: #eceff1; color: #455a64; }

        .today-row { background: #e8f5e9 !important; }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #f5f5f5;
        }

        .stat-box { text-align: center; }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #667eea;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        .export-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin: 35px auto 0;
            padding: 20px 30px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .export-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(40, 167, 69, 0.4);
        }

        .no-result {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }

        .footer {
            text-align: center;
            padding: 25px;
            color: #aaa;
            font-size: 13px;
            border-top: 1px solid #f0f0f0;
        }

        @media (max-width: 768px) {
            .employee-header { flex-direction: column; text-align: center; }
            .avatar { margin: 0 0 20px 0; }
            .stats-bar { flex-direction: column; gap: 25px; }
            .schedule-table { font-size: 14px; }
            .schedule-table th, .schedule-table td { padding: 12px 8px; }
        }
    </style>
</head>

        const searchInput = document.getElementById('searchInput');
        const content = document.getElementById('content');

        // Konversi bulan Indonesia ke number
        const monthMap = {
            'januari': 0, 'februari': 1, 'maret': 2, 'april': 3, 'mei': 4, 'juni': 5,
            'juli': 6, 'agustus': 7, 'september': 8, 'oktober': 9, 'november': 10, 'desember': 11
        };

        // Parse tanggal dari string
        function parseTanggal(str) {
            const match = str.toLowerCase().match(/(\d+)\s+(\w+)\s+(\d+)/);
            if (match) {
                const day = parseInt(match[1]);
                const month = monthMap[match[2]];
                const year = parseInt(match[3]);
                return new Date(year, month, day);
            }
            return new Date(0);
        }

        // Normalisasi dan URUTKAN data
        const normalizedData = jadwalData.map(item => ({
            tanggal: item.Tanggal,
            nama: item.Nama,
            noTelp: item['No Telpon']?.toString() || '',
            gender: item.Gender,
            posisi: item.Posisi,
            venue: item.Venue,
            shift: item.Shift,
            timeIn: formatTime(item['Time In']),
            timeOut: formatTime(item['Time Out']),
            dateObj: parseTanggal(item.Tanggal)
        })).sort((a, b) => a.dateObj - b.dateObj);

        function formatTime(time) {
            if (!time && time !== 0) return '--:--';
            const num = parseInt(time);
            return num.toString().padStart(2, '0') + '.00';
        }

        searchInput.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            
            if (!query) {
                showWelcome();
                return;
            }

            const results = normalizedData.filter(item => 
                item.nama.toLowerCase().includes(query)
            );

            if (results.length === 0) {
                showNoResult();
                return;
            }

            renderSchedule(results);
        });

        function showWelcome() {
            content.innerHTML = `
                <div class="welcome">
                    <div class="welcome-icon">👋</div>
                    <h2>Selamat Datang</h2>
                    <p>Masukkan nama Anda untuk melihat jadwal kerja</p>
                </div>
            `;
        }

        function showNoResult() {
            content.innerHTML = `
                <div class="no-result">
                    <div style="font-size: 64px; margin-bottom: 20px;">😕</div>
                    <h3>Nama Tidak Ditemukan</h3>
                    <p>Periksa ejaan atau hubungi admin</p>
                </div>
            `;
        }

        function renderSchedule(results) {
            const grouped = {};
            results.forEach(item => {
                if (!grouped[item.nama]) grouped[item.nama] = [];
                grouped[item.nama].push(item);
            });

            let html = '';
            for (const [nama, items] of Object.entries(grouped)) {
                const first = items[0];
                
                // Hitung unique venue
                const uniqueVenues = [];
                items.forEach(item => {
                    if (!uniqueVenues.includes(item.venue)) {
                        uniqueVenues.push(item.venue);
                    }
                });
                const venueCount = uniqueVenues.length;
                
                // REVISI: Header hanya Nama dan Gender
                html += `
                    <div class="schedule-card">
                        <div class="employee-header">
                            <div class="avatar">${getInitials(nama)}</div>
                            <div class="employee-info">
                                <h2>${nama}</h2>
                                <div class="employee-meta">
                                    <span class="meta-item">👤 ${first.gender}</span>
                                </div>
                            </div>
                        </div>

                        <table class="schedule-table">
                            <thead>
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Lokasi</th>
                                    <th>Posisi</th>
                                    <th>Shift</th>
                                    <th>Jam Masuk</th>
                                    <th>Jam Keluar</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${items.map(item => {
                                    const isToday = isDateToday(item.dateObj);
                                    return `
                                        <tr class="${isToday ? 'today-row' : ''}">
                                            <td class="date-cell">${item.tanggal}</td>
                                            <td>${item.venue}</td>
                                            <td>${item.posisi}</td>
                                            <td><span class="shift-badge ${getShiftClass(item.shift)}">${item.shift}</span></td>
                                            <td>${item.timeIn}</td>
                                            <td>${item.timeOut}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>

                        <div class="stats-bar">
                            <div class="stat-box">
                                <div class="stat-value">${items.length}</div>
                                <div class="stat-label">Total Shift</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value">${venueCount}</div>
                                <div class="stat-label">Lokasi Kerja</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value" style="font-size: 16px; margin-top: 10px;">${first.noTelp}</div>
                                <div class="stat-label">Kontak</div>
                            </div>
                        </div>

                        <button class="export-btn" onclick="exportToExcel('${nama}')">
                            📥 Download Jadwal Saya
                        </button>
                    </div>
                `;
            }

            content.innerHTML = html;
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        }

        function getShiftClass(shift) {
            const s = shift.toLowerCase();
            if (s.includes('pagi')) return 'shift-pagi';
            if (s.includes('siang')) return 'shift-siang';
            if (s.includes('sore')) return 'shift-sore';
            if (s.includes('malam')) return 'shift-malam';
            if (s.includes('full')) return 'shift-fullday';
            if (s.includes('midnight')) return 'shift-midnight';
            return 'shift-pagi';
        }

        function isDateToday(date) {
            const today = new Date();
            return date.toDateString() === today.toDateString();
        }

        function exportToExcel(nama) {
            const data = normalizedData.filter(item => item.nama === nama);
            
            const excelData = [
                ['JADWAL KERJA'],
                [''],
                ['Nama:', nama],
                ['Gender:', data[0].gender],
                ['No. HP:', data[0].noTelp],
                [''],
                ['Tanggal', 'Lokasi', 'Posisi', 'Shift', 'Jam Masuk', 'Jam Keluar']
            ];

            data.forEach(item => {
                excelData.push([
                    item.tanggal,
                    item.venue,
                    item.posisi,
                    item.shift,
                    item.timeIn,
                    item.timeOut
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(excelData);
            ws['!cols'] = [{wch: 25}, {wch: 15}, {wch: 20}, {wch: 15}, {wch: 12}, {wch: 12}];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Jadwal");
            XLSX.writeFile(wb, `Jadwal_${nama.replace(/\s+/g, '_')}.xlsx`);
        }
    </script>
</body>

</html>
